services:
  agenttodo:
    image: alansundy/agenttodo:latest
    build: .
    container_name: agenttodo
    restart: unless-stopped
    ports:
      - "3300:3300"
    volumes:
      - task-data:/data
    environment:
      - NODE_ENV=production
      - PORT=3300
      - DB_PATH=/data/tasks.db
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3300/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  task-data:
    driver: local
